<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Ultra Miami 2026</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="screen-home" class="screen active">
  <div style="text-align:center;">
    <h1 class="logo">ULTRA 2026</h1>
    <p class="logo-sub">MIAMI &middot; MARCH 27&ndash;29</p>
  </div>
  <input class="name-input" id="nameInput" placeholder="Enter your name" maxlength="20" autocomplete="off">
  <div class="home-actions">
    <button class="btn-primary" id="btnTier" disabled>&#9889; TIER LIST</button>
    <button class="btn-secondary" id="btnQP" disabled>&#127922; QUICK PICK MODE</button>
  </div>
  <div id="savedSection" style="display:none;flex-direction:column;align-items:center;gap:10px;width:100%;max-width:340px;">
    <p class="saved-label">SAVED RANKINGS</p>
    <div id="savedChips" style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;"></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
      <button class="btn-secondary" id="btnSchedule" style="display:none;width:auto;padding:10px 16px;font-size:13px;">&#128506; MY SCHEDULE</button>
      <button class="btn-secondary" id="btnCompare" style="display:none;width:auto;padding:10px 16px;font-size:13px;">&#9876; COMPARE</button>
    </div>
  </div>
</div>

<div id="screen-qp" class="screen">
  <div class="screen-hdr">
    <div class="hdr-row">
      <button class="btn-back" id="qpBack">&larr;</button>
      <div class="hdr-center">
        <span class="hdr-title">QUICK PICK</span>
        <span id="qpCounter" style="font-size:11px;color:var(--muted);margin-left:8px;"></span>
      </div>
      <button class="btn-green" id="qpDone">DONE &#10003;</button>
    </div>
    <div class="tab-row" id="qpDayTabs"></div>
    <div class="qp-progress"><div class="qp-progress-fill" id="qpProgress" style="width:0%"></div></div>
  </div>
  <div class="qp-arena" id="qpArena">
    <div class="qp-side" id="qpLeft">
      <div class="qp-card" id="qpCardL"></div>
      <div class="qp-tap-hint">TAP TO PICK</div>
    </div>
    <div class="qp-vs">VS</div>
    <div class="qp-side" id="qpRight">
      <div class="qp-card" id="qpCardR"></div>
      <div class="qp-tap-hint">TAP TO PICK</div>
    </div>
  </div>
  <div class="qp-footer">
    <button class="btn-back" id="qpSkip" style="padding:9px 22px;">Skip / Tie</button>
    <button class="btn-back" id="qpSwitchTier" style="padding:9px 14px;font-size:11px;">Tier List &rarr;</button>
  </div>
</div>

<div id="screen-tier" class="screen">
  <div class="screen-hdr">
    <div class="hdr-row">
      <button class="btn-back" id="tierBack">&larr;</button>
      <div class="hdr-center">
        <span class="hdr-title">TIER LIST</span>
        <span class="hdr-sub" id="tierUserLabel"></span>
      </div>
      <button class="btn-green" id="tierSaveBtn">SAVE</button>
    </div>
    <div class="tab-row" id="tierDayTabs"></div>
  </div>
  <div class="tier-wrap" id="tierRows"></div>
  <div class="unranked-box" id="unrankedBox">
    <div class="unranked-hdr"><span>UNRANKED</span><span id="unrankedCount"></span></div>
    <div class="unranked-content" id="unrankedContent"></div>
  </div>
  <div class="cancel-bar" id="cancelBar" style="display:none;">
    <button class="btn-danger" id="cancelSelBtn">&#10005; CANCEL</button>
  </div>
</div>

<div id="screen-schedule" class="screen">
  <div class="screen-hdr">
    <div class="hdr-row">
      <button class="btn-back" id="schedBack">&larr;</button>
      <div class="hdr-center"><span class="hdr-title">MY SCHEDULE</span></div>
    </div>
    <div class="tab-row" id="schedDayTabs"></div>
    <div class="tab-row" id="schedFilter"></div>
  </div>
  <div class="sched-wrap" id="schedBody"></div>
</div>

<div id="screen-compare" class="screen">
  <div class="screen-hdr">
    <div class="hdr-row">
      <button class="btn-back" id="cmpBack">&larr;</button>
      <div class="hdr-center"><span class="hdr-title">COMPARE</span></div>
    </div>
    <div class="tab-row" id="cmpDayTabs"></div>
  </div>
  <div class="cmp-wrap" id="cmpBody"></div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/ui.js"></script>
</body>
</html>
