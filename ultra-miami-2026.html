<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ultra Miami 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* Ultra Miami 2026 — Styles */

@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #06060a;
  --surface: #0d0d14;
  --border: #1a1a2a;
  --accent: #a855f7;
  --adim: rgba(168,85,247,.14);
  --green: #22c55e;
  --orange: #f97316;
  --muted: #42425a;
  --dim: #666;
  --text: #e8e8f0;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Subtle noise grain overlay */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: .5;
}

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: #2a2a40; border-radius: 4px; }

/* ── ANIMATIONS ─────────────────────────────────── */
@keyframes fadeUp    { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
@keyframes glowPulse { 0%,100% { opacity:.25; } 50% { opacity:.9; } }
@keyframes ripple    { 0% { transform:scale(1); } 45% { transform:scale(1.07); } 100% { transform:scale(1); } }
@keyframes selPulse  { 0%,100% { box-shadow:0 0 0 0 rgba(168,85,247,.5); } 50% { box-shadow:0 0 0 8px rgba(168,85,247,0); } }

/* ── SCREENS ─────────────────────────────────────── */
.screen { display: none; }
.screen.active { display: block; animation: fadeUp .22s ease; }

/* ── LOGO ────────────────────────────────────────── */
.logo {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: clamp(22px, 6vw, 40px);
  background: linear-gradient(135deg, #00d4ff 0%, #a855f7 50%, #ff2d95 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 2px;
  margin: 0;
  line-height: 1;
}

.logo-sub {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 4px;
  color: var(--muted);
  margin-top: 5px;
}

/* ── BUTTONS ─────────────────────────────────────── */
.btn-primary {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 1.5px;
  border-radius: 9px;
  border: 2px solid var(--accent);
  background: var(--adim);
  color: #d8b4fe;
  cursor: pointer;
  padding: 12px 20px;
  transition: all .15s;
  user-select: none;
  width: 100%;
}
.btn-primary:hover { background: rgba(168,85,247,.25); }
.btn-primary:disabled { opacity: .28; cursor: default; }

.btn-secondary {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 1.5px;
  border-radius: 9px;
  border: 2px solid var(--border);
  background: rgba(255,255,255,.03);
  color: var(--dim);
  cursor: pointer;
  padding: 12px 20px;
  transition: all .15s;
  user-select: none;
  width: 100%;
}
.btn-secondary:hover { border-color: #333; color: #aaa; }
.btn-secondary:disabled { opacity: .25; cursor: default; }

.btn-green {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 1px;
  border-radius: 8px;
  border: 2px solid var(--green);
  background: rgba(34,197,94,.1);
  color: #86efac;
  cursor: pointer;
  padding: 8px 16px;
  transition: all .15s;
}
.btn-green.saved { border-color: #444; color: #444; }

.btn-back {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 1px;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: rgba(255,255,255,.02);
  color: var(--dim);
  cursor: pointer;
  padding: 8px 14px;
  transition: all .15s;
}
.btn-back:hover { color: #aaa; border-color: #333; }

.btn-danger {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 1px;
  border-radius: 8px;
  border: 2px solid #771111;
  background: rgba(255,40,40,.06);
  color: #f87171;
  cursor: pointer;
  padding: 10px 36px;
  transition: all .15s;
}

/* ── TABS ────────────────────────────────────────── */
.tab {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 1px;
  border-radius: 7px;
  border: 2px solid var(--border);
  background: rgba(255,255,255,.02);
  color: var(--dim);
  cursor: pointer;
  padding: 6px 13px;
  transition: all .15s;
}
.tab:hover { color: #aaa; border-color: #333; }
.tab.active { border-color: var(--accent); background: var(--adim); color: #d8b4fe; }
.tab.tab-danger { border-color: #441111; color: #f87171; background: rgba(255,40,40,.05); font-size: 11px; }

/* ── CHIP (saved user) ───────────────────────────── */
.chip {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 1px;
  padding: 5px 14px;
  border-radius: 20px;
  background: var(--adim);
  border: 1px solid rgba(168,85,247,.25);
  color: #d8b4fe;
  cursor: pointer;
  transition: all .15s;
}
.chip:hover, .chip.active { background: rgba(168,85,247,.28); }

/* ─────────────────────────────────────────────────
   HOME SCREEN
───────────────────────────────────────────────── */
#screen-home {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  padding: 28px 20px;
  position: relative;
  z-index: 1;
}

.home-logo { text-align: center; }

.name-input {
  background: rgba(255,255,255,.05);
  border: 2px solid #252535;
  border-radius: 10px;
  color: #fff;
  font-family: 'Rajdhani', sans-serif;
  font-size: 20px;
  font-weight: 700;
  padding: 13px 22px;
  text-align: center;
  outline: none;
  letter-spacing: 1px;
  width: 100%;
  max-width: 300px;
  transition: border-color .2s;
}
.name-input:focus { border-color: var(--accent); }
.name-input::placeholder { color: #222232; }

.home-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
  max-width: 300px;
}

#savedSection {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  width: 100%;
  max-width: 340px;
}
.saved-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--muted);
}
#savedChips {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
}

.home-secondary {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  width: 100%;
  max-width: 300px;
}
.home-secondary .btn-secondary { font-size: 13px; padding: 10px 14px; }

/* ─────────────────────────────────────────────────
   SCREEN HEADER (shared)
───────────────────────────────────────────────── */
.screen-hdr {
  position: sticky;
  top: 0;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 13px 14px 10px;
  z-index: 20;
}
.hdr-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.hdr-center {
  flex: 1;
  text-align: center;
}
.hdr-title {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: 14px;
  letter-spacing: 2px;
  background: linear-gradient(135deg, #00d4ff, #a855f7, #ff2d95);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hdr-sub {
  font-size: 11px;
  color: var(--accent);
  margin-left: 8px;
  letter-spacing: .5px;
}
.tab-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 10px;
}

/* ─────────────────────────────────────────────────
   QUICK PICK SCREEN
───────────────────────────────────────────────── */
.qp-progress {
  height: 3px;
  background: #141420;
  border-radius: 2px;
  margin-top: 10px;
  overflow: hidden;
}
.qp-progress-fill {
  height: 100%;
  border-radius: 2px;
  background: linear-gradient(90deg, #a855f7, #ff2d95);
  transition: width .35s ease;
}

.qp-arena {
  display: flex;
  align-items: stretch;
  justify-content: center;
  min-height: calc(100vh - 175px);
  padding: 16px 8px;
}

.qp-side {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 10px 6px;
  border-radius: 14px;
  cursor: pointer;
  border: 2px solid transparent;
  max-width: 190px;
  transition: background .12s;
}
.qp-side:active, .qp-side.flash-win { background: rgba(255,255,255,.05); animation: ripple .3s ease; }

.qp-card {
  width: 100%;
  max-width: 155px;
  border-radius: 12px;
  overflow: hidden;
  border: 2px solid var(--border);
  background: var(--surface);
  box-shadow: 0 6px 24px rgba(0,0,0,.5);
  transition: transform .15s, border-color .15s;
}
.qp-side:hover .qp-card { transform: translateY(-4px); border-color: #2a2a42; }

.qp-avatar {
  width: 100%;
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: clamp(24px, 8vw, 40px);
  color: rgba(255,255,255,.9);
}

.qp-card-body { padding: 10px 11px 13px; }
.qp-artist-name { font-weight: 700; font-size: 15px; line-height: 1.2; margin-bottom: 5px; }
.qp-stage { font-size: 11px; color: var(--muted); }
.qp-time { font-size: 14px; color: var(--accent); font-weight: 700; margin-top: 3px; }

.qp-vs {
  width: 44px;
  min-width: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: 18px;
  color: var(--muted);
  align-self: center;
  text-shadow: 0 0 20px var(--accent);
}

.qp-tap-hint {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--muted);
}

.qp-footer {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 0 14px 24px;
}

.qp-done {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  min-height: calc(100vh - 200px);
  padding: 24px;
  text-align: center;
  flex: 1;
}
.qp-done-emoji { font-size: 56px; }
.qp-done-label {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: 18px;
  letter-spacing: 2px;
  color: #d8b4fe;
}

/* ─────────────────────────────────────────────────
   TIER LIST SCREEN
───────────────────────────────────────────────── */
.tier-wrap { max-width: 960px; margin: 12px auto; padding: 0 10px; }

.tier-row {
  display: flex;
  margin-bottom: 4px;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
  min-height: 74px;
  transition: all .15s;
}
.tier-row.drop-target {
  border-color: var(--accent);
  background: rgba(168,85,247,.07);
  cursor: pointer;
}

.tier-lbl {
  width: 50px;
  min-width: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: 22px;
  color: #000;
  position: relative;
  flex-shrink: 0;
}
.tier-lbl-glow {
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,.18);
  animation: glowPulse 1.3s ease-in-out infinite;
}

.tier-content {
  flex: 1;
  display: flex;
  flex-wrap: wrap;
  align-items: flex-start;
  align-content: flex-start;
  gap: 5px;
  padding: 7px;
  min-height: 64px;
}

.tier-placeholder {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  animation: glowPulse 1.5s ease-in-out infinite;
}

.unranked-box {
  max-width: 960px;
  margin: 12px auto 80px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: rgba(255,255,255,.01);
  transition: all .15s;
}
.unranked-box.drop-target {
  border-color: rgba(168,85,247,.45);
  background: rgba(168,85,247,.06);
  cursor: pointer;
}
.unranked-hdr {
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  font-weight: 700;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 2px;
  display: flex;
  justify-content: space-between;
}
.unranked-content {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  padding: 10px;
  min-height: 80px;
}

/* Artist chip */
.artist-chip {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 74px;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  border-radius: 9px;
  padding: 5px 3px;
  transition: opacity .15s, transform .12s, background .1s;
}
.artist-chip:hover { background: rgba(255,255,255,.05); }
.artist-chip.dimmed { opacity: .18; }
.artist-chip.selected { transform: scale(1.08); }

.chip-icon {
  width: 54px;
  height: 54px;
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  font-size: 13px;
  color: rgba(255,255,255,.9);
  border: 1.5px solid rgba(255,255,255,.07);
  box-shadow: 0 2px 10px rgba(0,0,0,.4);
  letter-spacing: .5px;
  transition: all .15s;
}
.artist-chip.selected .chip-icon {
  border: 2px solid var(--accent);
  box-shadow: 0 0 0 2px var(--accent), 0 0 16px rgba(168,85,247,.5);
  animation: selPulse 1.5s ease-in-out infinite;
}

.chip-name {
  font-size: 8.5px;
  font-weight: 700;
  color: var(--dim);
  text-align: center;
  margin-top: 4px;
  line-height: 1.15;
  max-width: 72px;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.artist-chip.selected .chip-name { color: #d8b4fe; }

.chip-time {
  font-size: 8px;
  color: var(--accent);
  font-weight: 700;
  margin-top: 2px;
}
.chip-stage {
  font-size: 7px;
  color: #252538;
  font-weight: 600;
  margin-top: 1px;
  text-align: center;
  max-width: 72px;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}
.artist-chip:hover .chip-stage { color: #3a3a55; }

/* Cancel bar */
.cancel-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 14px 20px;
  background: linear-gradient(to top, var(--bg) 55%, transparent);
  display: flex;
  justify-content: center;
  z-index: 50;
}

/* ─────────────────────────────────────────────────
   SCHEDULE SCREEN
───────────────────────────────────────────────── */
.sched-wrap { max-width: 680px; margin: 0 auto; padding: 18px 14px 60px; }

.sched-meta {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1.5px;
  margin-bottom: 14px;
  text-align: center;
  font-weight: 700;
}

.sched-stats {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
.sched-stat {
  flex: 1;
  min-width: 100px;
  padding: 10px 16px;
  border-radius: 8px;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 1px;
  text-align: center;
  border: 1px solid;
}
.sched-stat.green { background: rgba(34,197,94,.07); border-color: rgba(34,197,94,.3); color: #86efac; }
.sched-stat.orange { background: rgba(249,115,22,.07); border-color: rgba(249,115,22,.3); color: #fb923c; }

.sched-section-lbl {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--muted);
  margin: 0 0 10px 2px;
}
.sched-section-lbl.conflict-lbl { color: var(--orange); margin-top: 22px; }

.sched-slot {
  display: flex;
  gap: 14px;
  padding: 13px 15px;
  border-radius: 10px;
  margin-bottom: 6px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,.025);
  animation: fadeUp .3s ease both;
  position: relative;
  overflow: hidden;
}
.sched-slot::before {
  content: "";
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--border);
}
.sched-slot.conflict { border-color: rgba(249,115,22,.2); }
.sched-slot.conflict::before { background: var(--orange); }

.sched-time {
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  min-width: 60px;
  padding-top: 2px;
  flex-shrink: 0;
}
.sched-time.dim { color: rgba(249,115,22,.4); }

.sched-info { flex: 1; min-width: 0; }
.sched-artist {
  font-weight: 700;
  font-size: 17px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  line-height: 1.2;
}
.sched-artist.faded { opacity: .55; }
.sched-stage { font-size: 11px; color: var(--muted); margin-top: 3px; }
.sched-until { font-size: 10px; color: #2a2a3a; margin-top: 2px; }

.tier-pip {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 23px;
  height: 23px;
  border-radius: 5px;
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  font-weight: 900;
  color: #000;
  flex-shrink: 0;
}

.conflict-tag {
  font-size: 10px;
  font-weight: 700;
  color: var(--orange);
  background: rgba(249,115,22,.1);
  padding: 2px 9px;
  border-radius: 4px;
  display: inline-block;
  margin-top: 5px;
  letter-spacing: .3px;
}

.tier-filter-btn {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 1px;
  border-radius: 7px;
  border: 2px solid color-mix(in srgb, var(--tc) 40%, transparent);
  background: transparent;
  color: var(--tc);
  cursor: pointer;
  padding: 6px 13px;
  transition: all .15s;
}
.tier-filter-btn.on {
  background: var(--tc);
  border-color: var(--tc);
  color: #000;
}

/* ─────────────────────────────────────────────────
   COMPARE SCREEN
───────────────────────────────────────────────── */
.cmp-wrap { max-width: 960px; margin: 0 auto; padding: 12px; }

.cmp-header-row { display: flex; gap: 8px; margin-bottom: 8px; }
.cmp-col { flex: 1; min-width: 0; }
.cmp-user-lbl {
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 1.5px;
  text-align: center;
  padding: 6px;
  border-bottom: 1px solid var(--border);
  color: var(--dim);
  margin-bottom: 6px;
}

.cmp-row { display: flex; gap: 8px; margin-bottom: 3px; }
.cmp-tier-row {
  display: flex;
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid var(--border);
  min-height: 40px;
}
.cmp-tier-lbl {
  width: 30px;
  min-width: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: 14px;
  color: #000;
}
.cmp-tier-content { flex: 1; display: flex; flex-wrap: wrap; gap: 3px; padding: 4px; }

.cmp-chip { width: 38px; display: flex; flex-direction: column; align-items: center; }
.cmp-icon {
  width: 30px;
  height: 30px;
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  font-size: 9px;
  color: rgba(255,255,255,.88);
  border: 1px solid rgba(255,255,255,.07);
}
.cmp-icon.match { outline: 2px solid var(--green); outline-offset: -1px; }
.cmp-name {
  font-size: 6px;
  font-weight: 700;

  // Helpers
  fmtTime: function(mins) {
    var h = Math.floor(mins / 60) % 24;
    var m = mins % 60;
    var ap = h >= 12 ? "PM" : "AM";
    var h12 = h > 12 ? h - 12 : (h === 0 ? 12 : h);
    return h12 + ":" + (m < 10 ? "0" + m : m) + " " + ap;
  },

  getSet: function(day, artist) {
    return this.sets[day].find(function(s) { return s.a === artist; });
  },

  // Unique artist list per day
  artists: function(day) {
    var seen = {};
    var out = [];
    this.sets[day].forEach(function(s) {
      if (!seen[s.a]) { seen[s.a] = true; out.push(s.a); }
    });
    return out;
  },

  // Artist avatar color
  color1: function(n) {
    var h = 0;
    for (var i = 0; i < n.length; i++) h = n.charCodeAt(i) + ((h << 5) - h);
    return "hsl(" + (Math.abs(h) % 360) + ",60%,28%)";
  },
  color2: function(n) {
    var h = 0;
    for (var i = 0; i < n.length; i++) h = n.charCodeAt(i) + ((h << 5) - h);
    return "hsl(" + ((Math.abs(h) + 140) % 360) + ",52%,36%)";
  },
  initials: function(n) {
    return n.split(" ").map(function(w) { return w[0] || ""; }).join("").slice(0, 2).toUpperCase();
  },
};

  userName: '',
  activeDay: 'friday',
  sel: null,
  allTiers: {},

  qpQueue: [],
  qpIdx: 0,
  schedFilter: ['S','A','B'],

  savedUsers: function() { return Object.keys(this.allTiers); },

  getTiers: function(user, day) {
    if (!this.allTiers[user]) this.allTiers[user] = {};
    if (!this.allTiers[user][day]) {
      var t = { unranked: ULTRA.artists(day) };
      ['S','A','B','C','D','F'].forEach(function(id) { t[id] = []; });
      this.allTiers[user][day] = t;
    }
    return this.allTiers[user][day];
  },

  resetDay: function(user, day) {
    if (!this.allTiers[user]) this.allTiers[user] = {};
    var t = { unranked: ULTRA.artists(day) };
    ['S','A','B','C','D','F'].forEach(function(id) { t[id] = []; });
    this.allTiers[user][day] = t;
  },

  saveUser: function() {
    try {
      localStorage.setItem('ultra2026_tiers', JSON.stringify(this.allTiers));
      localStorage.setItem('ultra2026_scores', JSON.stringify(this.allScores));
    } catch(e) {}
  },

  loadUser: function() {
    try {
      var t = localStorage.getItem('ultra2026_tiers');
      var s = localStorage.getItem('ultra2026_scores');
      if (t) this.allTiers = JSON.parse(t);
      if (s) this.allScores = JSON.parse(s);
    } catch(e) {}
  },

  initQP: function(day) {
    var arr = ULTRA.artists(day).slice().sort(function() { return Math.random() - 0.5; });
    var q = [];
    for (var i = 0; i < arr.length - 1; i += 2) q.push([arr[i], arr[i+1]]);
    if (arr.length % 2) q.push([arr[arr.length-1], arr[Math.floor(Math.random()*(arr.length-1))]]);
    this.qpQueue = q;
    this.qpIdx = 0;
    this.qpDay = day;
    if (!this.allScores[this.userName]) this.allScores[this.userName] = {};
    if (!this.allScores[this.userName][day]) {
      var scores = {};
      ULTRA.artists(day).forEach(function(a) { scores[a] = 0; });
      this.allScores[this.userName][day] = scores;
    }
  },

  applyQPToTiers: function(day) {
    var scores = (this.allScores[this.userName] || {})[day] || {};
    var sorted = ULTRA.artists(day).slice().sort(function(a,b) {
      return (scores[b]||0) - (scores[a]||0);
    });
    var total = sorted.length;
    var cuts = [0.05, 0.10, 0.15, 0.20, 0.20];
    var ids = ['S','A','B','C','D','F'];
    var t = { unranked: [] };
    var cur = 0;
    ids.forEach(function(tid, i) {
      var cnt = i < ids.length-1 ? Math.max(1, Math.ceil(total * cuts[i])) : total - cur;
      t[tid] = sorted.slice(cur, cur + cnt);
      cur += cnt;
    });
    if (!this.allTiers[this.userName]) this.allTiers[this.userName] = {};
    this.allTiers[this.userName][day] = t;
  },

  buildSchedule: function(user, day, tierFilter) {
    var ut = (this.allTiers[user] || {})[day];
    if (!ut) return { chosen: [], conflicts: [] };
    var cands = [];
    var tierRank = {S:0,A:1,B:2,C:3,D:4,F:5};
    tierFilter.forEach(function(tid) {
      (ut[tid]||[]).forEach(function(artist) {
        ULTRA.sets[day].filter(function(s) { return s.a === artist; }).forEach(function(slot) {
          cands.push({ a:slot.a, t:slot.t, e:slot.e, s:slot.s, tier:tid });
        });
      });
    });
    cands.sort(function(a,b) { return a.t-b.t || tierRank[a.tier]-tierRank[b.tier]; });
    var chosen = [], conflicts = [];
    cands.forEach(function(slot) {
      var blocked = null;
      for (var i = 0; i < chosen.length; i++) {
        if (chosen[i].t < slot.e && slot.t < chosen[i].e) { blocked = chosen[i]; break; }
      }
      if (!blocked) chosen.push(slot);
      else { slot.clashWith = blocked.a; conflicts.push(slot); }
    });
    return { chosen: chosen, conflicts: conflicts };
  },
};

// ui.js - All rendering, no object methods, plain functions

function gid(id) { return document.getElementById(id); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  var el = gid(id);
  if (el) el.classList.add('active');
  window.scrollTo(0, 0);
}

function htmlEsc(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ═══════════════════════ HOME ═══════════════════════

function renderHome() {
  showScreen('screen-home');

  var inp = gid('nameInput');
  inp.value = APP.userName;
  refreshHomeButtons();

  inp.oninput = function() { APP.userName = inp.value.trim(); refreshHomeButtons(); };
  inp.onkeydown = function(e) { if (e.key === 'Enter' && APP.userName) goTierList(); };
  gid('btnTier').onclick = goTierList;
  gid('btnQP').onclick = goQuickPick;
  gid('btnSchedule').onclick = goSchedule;
  gid('btnCompare').onclick = goCompare;
}

function refreshHomeButtons() {
  var has = APP.userName.length > 0;
  gid('btnTier').disabled = !has;
  gid('btnQP').disabled = !has;

  var saved = APP.savedUsers();
  var sec = gid('savedSection');

  if (saved.length > 0) {
    sec.style.display = 'flex';
    var chips = gid('savedChips');
    chips.innerHTML = '';
    saved.forEach(function(name) {
      var btn = document.createElement('button');
      btn.className = 'chip' + (name === APP.userName ? ' active' : '');
      btn.textContent = name;
      btn.onclick = function() {
        APP.userName = name;
        gid('nameInput').value = name;
        refreshHomeButtons();
      };
      chips.appendChild(btn);
    });
    gid('btnSchedule').style.display = 'inline-block';
    gid('btnCompare').style.display = saved.length >= 2 ? 'inline-block' : 'none';
  } else {
    sec.style.display = 'none';
  }
}

// ═══════════════════════ QUICK PICK ═══════════════════════

function goQuickPick() {
  if (!APP.userName) return;
  APP.qpDay = 'friday';
  APP.initQP('friday');
  showScreen('screen-qp');
  renderQP();
}

function renderQP() {
  var d = APP.qpDay;
  var tabs = gid('qpDayTabs');
  tabs.innerHTML = '';
  ULTRA.days.forEach(function(day) {
    var btn = document.createElement('button');
    btn.className = 'tab' + (day === d ? ' active' : '');
    btn.textContent = ULTRA.dayLabels[day];
    btn.onclick = function() { APP.qpDay = day; APP.initQP(day); renderQP(); };
    tabs.appendChild(btn);
  });

  gid('qpBack').onclick = renderHome;
  gid('qpDone').onclick = function() { APP.applyQPToTiers(d); APP.saveUser(); goTierList(); };
  gid('qpSkip').onclick = function() { APP.qpIdx++; renderQP(); };
  gid('qpSwitchTier').onclick = goTierList;

  // Always restore arena HTML in case it was replaced by the "done" screen
  var arena = gid('qpArena');
  if (!gid('qpLeft')) {
    arena.innerHTML =
      '<div class="qp-side" id="qpLeft"><div class="qp-card" id="qpCardL"></div><div class="qp-tap-hint">TAP TO PICK</div></div>' +
      '<div class="qp-vs">VS</div>' +
      '<div class="qp-side" id="qpRight"><div class="qp-card" id="qpCardR"></div><div class="qp-tap-hint">TAP TO PICK</div></div>';
  }

  var q = APP.qpQueue;
  var i = APP.qpIdx;
  var prog = gid('qpProgress');

  if (i >= q.length) {
    APP.applyQPToTiers(d);
    APP.saveUser();
    prog.style.width = '100%';
    gid('qpCounter').textContent = 'Done!';
    gid('qpArena').innerHTML =
      '<div class="qp-done">' +
      '<div class="qp-done-emoji">&#127881;</div>' +
      '<div class="qp-done-label">' + ULTRA.dayLabels[d] + ' RANKED!</div>' +
      '<button class="btn-primary" id="qpViewTier" style="width:auto;padding:12px 28px;">View Tier List &rarr;</button>' +
      '</div>';
    gid('qpViewTier').onclick = goTierList;
    return;
  }

  prog.style.width = Math.round((i / q.length) * 100) + '%';
  gid('qpCounter').textContent = (i + 1) + ' / ' + q.length;

  var a = q[i][0], b = q[i][1];
  gid('qpCardL').innerHTML = qpCardHTML(a, d);
  gid('qpCardR').innerHTML = qpCardHTML(b, d);
  gid('qpLeft').className = 'qp-side';
  gid('qpRight').className = 'qp-side';

  gid('qpLeft').onclick = function() {
    APP.allScores[APP.userName][d][a] = (APP.allScores[APP.userName][d][a] || 0) + 2;
    gid('qpLeft').classList.add('flash-win');
    setTimeout(function() { APP.qpIdx++; renderQP(); }, 200);
  };
  gid('qpRight').onclick = function() {
    APP.allScores[APP.userName][d][b] = (APP.allScores[APP.userName][d][b] || 0) + 2;
    gid('qpRight').classList.add('flash-win');
    setTimeout(function() { APP.qpIdx++; renderQP(); }, 200);
  };
}

function qpCardHTML(artist, day) {
  var set = ULTRA.getSet(day, artist);
  var c1 = ULTRA.color1(artist), c2 = ULTRA.color2(artist);
  return '<div class="qp-avatar" style="background:linear-gradient(135deg,' + c1 + ',' + c2 + ')">' +
    ULTRA.initials(artist) + '</div>' +
    '<div class="qp-card-body">' +
    '<div class="qp-artist-name">' + htmlEsc(artist) + '</div>' +
    '<div class="qp-stage">' + (set ? htmlEsc(set.s) : '') + '</div>' +
    '<div class="qp-time">' + (set ? ULTRA.fmtTime(set.t) : 'TBA') + '</div>' +
    '</div>';
}

// ═══════════════════════ TIER LIST ═══════════════════════

var TIER_DEFS = [
  {id:'S',c:'#ff3b3b'},{id:'A',c:'#ff8c00'},{id:'B',c:'#f5c400'},
  {id:'C',c:'#6fcc3a'},{id:'D',c:'#00bfff'},{id:'F',c:'#9966ff'}
];

function goTierList() {
  if (!APP.userName) return;
  APP.activeDay = 'friday';
  APP.sel = null;
  showScreen('screen-tier');
  renderTierHeader();
  renderTierRows();
}

function renderTierHeader() {
  gid('tierUserLabel').textContent = APP.userName.toUpperCase();
  gid('tierBack').onclick = renderHome;
  gid('tierSaveBtn').onclick = function() {
    APP.saveUser();
    gid('tierSaveBtn').textContent = 'SAVED';
    gid('tierSaveBtn').classList.add('saved');
    setTimeout(function() {
      gid('tierSaveBtn').textContent = 'SAVE';
      gid('tierSaveBtn').classList.remove('saved');
    }, 1500);
  };
  gid('cancelSelBtn').onclick = function() { APP.sel = null; renderTierRows(); };

  var tabs = gid('tierDayTabs');
  tabs.innerHTML = '';
  ULTRA.days.forEach(function(day) {
    var btn = document.createElement('button');
    btn.className = 'tab' + (day === APP.activeDay ? ' active' : '');
    btn.textContent = ULTRA.dayLabels[day];
    btn.onclick = function() { APP.activeDay = day; APP.sel = null; renderTierHeader(); renderTierRows(); };
    tabs.appendChild(btn);
  });
  var resetBtn = document.createElement('button');
  resetBtn.className = 'tab tab-danger';
  resetBtn.textContent = 'RESET';
  resetBtn.onclick = function() { APP.resetDay(APP.userName, APP.activeDay); APP.sel = null; renderTierRows(); };
  tabs.appendChild(resetBtn);
}

function renderTierRows() {
  var day = APP.activeDay;
  var ct = APP.getTiers(APP.userName, day);
  var sel = APP.sel;
  var hasSel = !!sel;

  var wrap = gid('tierRows');
  wrap.innerHTML = '';

  TIER_DEFS.forEach(function(tier) {
    var isTarget = hasSel && sel.from !== tier.id;
    var row = document.createElement('div');
    row.className = 'tier-row' + (isTarget ? ' drop-target' : '');

    var lbl = document.createElement('div');
    lbl.className = 'tier-lbl';
    lbl.style.background = tier.c;
    lbl.textContent = tier.id;
    if (isTarget) {
      var glow = document.createElement('div');
      glow.className = 'tier-lbl-glow';
      lbl.appendChild(glow);
    }

    var content = document.createElement('div');
    content.className = 'tier-content';

    if (ct[tier.id].length === 0 && isTarget) {
      var ph = document.createElement('div');
      ph.className = 'tier-placeholder';
      ph.textContent = 'DROP HERE';
      ph.style.color = tier.c + '77';
      content.appendChild(ph);
    }

    ct[tier.id].forEach(function(a) { content.appendChild(makeChip(a, tier.id, hasSel, day)); });
    row.appendChild(lbl);
    row.appendChild(content);
    if (isTarget) { (function(tid) { row.onclick = function() { moveArtist(tid); }; })(tier.id); }
    wrap.appendChild(row);
  });

  // Unranked
  var uTarget = hasSel && sel.from !== 'unranked';
  var ubox = gid('unrankedBox');
  ubox.className = 'unranked-box' + (uTarget ? ' drop-target' : '');
  gid('unrankedCount').textContent = ct.unranked.length + ' artists';
  var uc = gid('unrankedContent');
  uc.innerHTML = '';
  ct.unranked.forEach(function(a) { uc.appendChild(makeChip(a, 'unranked', hasSel, day)); });
  ubox.onclick = uTarget ? function() { moveArtist('unranked'); } : null;
  gid('cancelBar').style.display = hasSel ? 'flex' : 'none';
}

function makeChip(name, fromTier, hasSel, day) {
  var sel = APP.sel;
  var isSel = sel && sel.a === name && sel.from === fromTier;
  var dimmed = hasSel && !isSel;
  var set = ULTRA.getSet(day, name);
  var c1 = ULTRA.color1(name), c2 = ULTRA.color2(name);

  var chip = document.createElement('div');
  chip.className = 'artist-chip' + (isSel ? ' selected' : '') + (dimmed ? ' dimmed' : '');
  chip.innerHTML =
    '<div class="chip-icon" style="background:linear-gradient(135deg,' + c1 + ',' + c2 + ')">' + ULTRA.initials(name) + '</div>' +
    '<div class="chip-name">' + htmlEsc(name) + '</div>' +
    '<div class="chip-time">' + (set ? ULTRA.fmtTime(set.t) : '-') + '</div>' +
    '<div class="chip-stage">' + (set ? htmlEsc(set.s) : '') + '</div>';

  (function(n, ft, wasSel) {
    chip.onclick = function(e) {
      e.stopPropagation();
      APP.sel = wasSel ? null : { a: n, from: ft };
      renderTierRows();
    };
  })(name, fromTier, isSel);

  return chip;
}

function moveArtist(target) {
  if (!APP.sel) return;
  var day = APP.activeDay;
  var ct = APP.getTiers(APP.userName, day);
  var a = APP.sel.a, from = APP.sel.from;
  if (from === 'unranked') ct.unranked = ct.unranked.filter(function(x) { return x !== a; });
  else ct[from] = ct[from].filter(function(x) { return x !== a; });
  if (target === 'unranked') ct.unranked.push(a);
  else ct[target].push(a);
  APP.sel = null;
  renderTierRows();
}

// ═══════════════════════ SCHEDULE ═══════════════════════

function goSchedule() {
  showScreen('screen-schedule');
  APP.activeDay = 'friday';
  APP.schedFilter = ['S','A','B'];
  renderSchedule();
}

function renderSchedule() {
  gid('schedBack').onclick = renderHome;

  var tabs = gid('schedDayTabs');
  tabs.innerHTML = '';
  ULTRA.days.forEach(function(day) {
    var btn = document.createElement('button');
    btn.className = 'tab' + (day === APP.activeDay ? ' active' : '');
    btn.textContent = ULTRA.dayLabels[day];
    btn.onclick = function() { APP.activeDay = day; renderSchedule(); };
    tabs.appendChild(btn);
  });

  var filterEl = gid('schedFilter');
  filterEl.innerHTML = '';
  var tierColors = {S:'#ff3b3b',A:'#ff8c00',B:'#f5c400',C:'#6fcc3a',D:'#00bfff',F:'#9966ff'};
  Object.keys(tierColors).forEach(function(tid) {
    var on = APP.schedFilter.indexOf(tid) >= 0;
    var btn = document.createElement('button');
    btn.className = 'tier-filter-btn' + (on ? ' on' : '');
    btn.textContent = tid;
    btn.style.setProperty('--tc', tierColors[tid]);
    btn.onclick = function() {
      var idx = APP.schedFilter.indexOf(tid);
      if (idx >= 0) { if (APP.schedFilter.length > 1) APP.schedFilter.splice(idx, 1); }
      else APP.schedFilter.push(tid);
      renderSchedule();
    };
    filterEl.appendChild(btn);
  });

  renderScheduleBody();
}

function renderScheduleBody() {
  var saved = APP.savedUsers();
  var wrap = gid('schedBody');
  if (!saved.length) {
    wrap.innerHTML = '<div class="empty-msg">Save your tier list first to generate a schedule.</div>';
    return;
  }
  var user = APP.allTiers[APP.userName] ? APP.userName : saved[0];
  var result = APP.buildSchedule(user, APP.activeDay, APP.schedFilter);
  var chosen = result.chosen, conflicts = result.conflicts;
  var tierColors = {S:'#ff3b3b',A:'#ff8c00',B:'#f5c400',C:'#6fcc3a',D:'#00bfff',F:'#9966ff'};

  if (!chosen.length && !conflicts.length) {
    wrap.innerHTML = '<div class="empty-msg">No ranked artists in selected tiers for this day.<br>Go rank some artists first!</div>';
    return;
  }

  var h = '<div class="sched-meta">' + htmlEsc(user.toUpperCase()) + ' &middot; ' + ULTRA.dayLabels[APP.activeDay] + '</div>';
  h += '<div class="sched-stats">';
  h += '<div class="sched-stat green">&#10003; ' + chosen.length + ' sets</div>';
  if (conflicts.length) h += '<div class="sched-stat orange">&#9889; ' + conflicts.length + ' conflicts</div>';
  h += '</div>';
  h += '<div class="sched-section-lbl">YOUR SCHEDULE</div>';

  chosen.sort(function(a,b){return a.t-b.t;}).forEach(function(sl, i) {
    var tc = tierColors[sl.tier] || '#888';
    h += '<div class="sched-slot" style="animation-delay:' + (i*0.05) + 's">' +
      '<div class="sched-time">' + ULTRA.fmtTime(sl.t) + '</div>' +
      '<div class="sched-info">' +
      '<div class="sched-artist"><span class="tier-pip" style="background:' + tc + '">' + sl.tier + '</span>' + htmlEsc(sl.a) + '</div>' +
      '<div class="sched-stage">' + htmlEsc(sl.s) + '</div>' +
      '<div class="sched-until">Until ' + ULTRA.fmtTime(sl.e) + '</div>' +
      '</div></div>';
  });

  if (conflicts.length) {
    h += '<div class="sched-section-lbl conflict-lbl">&#9889; CONFLICTS</div>';
    conflicts.sort(function(a,b){return a.t-b.t;}).forEach(function(sl, i) {
      var tc = tierColors[sl.tier] || '#888';
      h += '<div class="sched-slot conflict" style="animation-delay:' + ((chosen.length+i)*0.05) + 's">' +
        '<div class="sched-time dim">' + ULTRA.fmtTime(sl.t) + '</div>' +
        '<div class="sched-info">' +
        '<div class="sched-artist faded"><span class="tier-pip" style="background:' + tc + '">' + sl.tier + '</span>' + htmlEsc(sl.a) + '</div>' +
        '<div class="sched-stage">' + htmlEsc(sl.s) + '</div>' +
        '<div class="conflict-tag">&#9889; overlaps with ' + htmlEsc(sl.clashWith || '') + '</div>' +
        '</div></div>';
    });
  }
  wrap.innerHTML = h;
}

// ═══════════════════════ COMPARE ═══════════════════════

function goCompare() {
  showScreen('screen-compare');
  APP.activeDay = 'friday';
  renderCompare();
}

function renderCompare() {
  gid('cmpBack').onclick = renderHome;
  var tabs = gid('cmpDayTabs');
  tabs.innerHTML = '';
  ULTRA.days.forEach(function(day) {
    var btn = document.createElement('button');
    btn.className = 'tab' + (day === APP.activeDay ? ' active' : '');
    btn.textContent = ULTRA.dayLabels[day];
    btn.onclick = function() { APP.activeDay = day; renderCompare(); };
    tabs.appendChild(btn);
  });
  renderCompareBody();
}

function renderCompareBody() {
  var saved = APP.savedUsers();
  var wrap = gid('cmpBody');
  if (saved.length < 2) {
    wrap.innerHTML = '<div class="empty-msg">Need 2+ saved rankings to compare.</div>';
    return;
  }
  var u1 = saved[0], u2 = saved[1];
  var t1 = APP.getTiers(u1, APP.activeDay);
  var t2 = APP.getTiers(u2, APP.activeDay);
  var tierIds = ['S','A','B','C','D','F'];
  var tierColors = {S:'#ff3b3b',A:'#ff8c00',B:'#f5c400',C:'#6fcc3a',D:'#00bfff',F:'#9966ff'};
  var m1 = {}, m2 = {};
  tierIds.concat(['unranked']).forEach(function(tid) {
    (t1[tid]||[]).forEach(function(a){m1[a]=tid;});
    (t2[tid]||[]).forEach(function(a){m2[a]=tid;});
  });

  var h = '<div class="cmp-header-row"><div class="cmp-col"><div class="cmp-user-lbl">' + htmlEsc(u1.toUpperCase()) + '</div></div><div class="cmp-col"><div class="cmp-user-lbl">' + htmlEsc(u2.toUpperCase()) + '</div></div></div>';
  tierIds.forEach(function(tid) {
    var tc = tierColors[tid];
    h += '<div class="cmp-row">';
    [[u1,m2,t1],[u2,m1,t2]].forEach(function(pair) {
      var om = pair[1], ct = pair[2];
      h += '<div class="cmp-col"><div class="cmp-tier-row"><div class="cmp-tier-lbl" style="background:' + tc + '">' + tid + '</div><div class="cmp-tier-content">';
      (ct[tid]||[]).forEach(function(a) {
        var c1 = ULTRA.color1(a), c2 = ULTRA.color2(a);
        h += '<div class="cmp-chip"><div class="cmp-icon' + (om[a]===tid?' match':'') + '" style="background:linear-gradient(135deg,' + c1 + ',' + c2 + ')">' + ULTRA.initials(a) + '</div><div class="cmp-name">' + htmlEsc(a) + '</div></div>';
      });
      h += '</div></div></div>';
    });
    h += '</div>';
  });
  wrap.innerHTML = h;
}

// ═══════════════════════ BOOT ═══════════════════════
APP.loadUser();
renderHome();

</script>
